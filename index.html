<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorepad V1 - Universal Pro</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #2c3e50; --border: #ced4da; --accent: #27ae60; --total-bg: #e2e6ea; }
        .dark-mode { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #444; --accent: #2ecc71; --total-bg: #2d2d2d; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* Universal Drag/Selection Fixes */
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        input, select, .editable-name { -webkit-user-select: text; user-select: text; pointer-events: auto !important; }

        .container { background: var(--card); padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); max-width: 500px; margin: auto; }
        .main-title { text-align: center; margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
        #winnerSpotlight { text-align: center; padding: 12px; margin: 15px 0; border-radius: 10px; color: #000; font-weight: bold; display: none; border: 1px solid rgba(0,0,0,0.1); }
        
        .input-section { display: flex; gap: 8px; margin-bottom: 20px; background: var(--bg); padding: 10px; border-radius: 10px; align-items: center; }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 16px; width: 100%; box-sizing: border-box; }
        button { padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #leaderboardTable { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 20px; }
        #leaderboardTable tr { background: var(--card); }
        #leaderboardTable td { padding: 0; border-bottom: 1px solid var(--border); vertical-align: middle; height: 52px; }
        
        .drag-handle { width: 40px; text-align: center; color: #95a5a6; font-size: 20px; cursor: grab; touch-action: none; }
        .sortable-ghost { opacity: 0.5; background: #3498db !important; }
        
        .editable-name { cursor: pointer; display: inline-block; width: 100%; height: 100%; line-height: 52px; padding-left: 10px; }
        
        .circle-color-picker { width: 26px; height: 26px; border-radius: 50%; position: relative; overflow: hidden; margin: auto; border: 1px solid var(--border); }
        .square-color-picker { width: 44px; height: 44px; border-radius: 8px; border: 1px solid var(--border); position: relative; overflow: hidden; flex-shrink: 0; }
        .color-input-hidden { position: absolute; opacity: 0; width: 100%; height: 100%; top: 0; left: 0; cursor: pointer; }
        
        .round-container { overflow-x: auto; margin-top: 10px; border: 1px solid var(--border); border-radius: 8px; }
        #roundTable { width: 100%; border-collapse: collapse; min-width: 100%; }
        #roundTable th, #roundTable td { padding: 10px; border: 1px solid var(--border); text-align: center; font-size: 0.85rem; }
        .total-row td { background: var(--total-bg) !important; font-weight: bold; border-top: 2px solid var(--border); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<div id="renameModal" class="modal"><div class="modal-content"><h3>Rename Player</h3><input type="text" id="renameInput"><div style="display:flex; gap:10px; margin-top:15px;"><button onclick="closeModal('renameModal')" style="background:#95a5a6; flex:1">Cancel</button><button onclick="saveRename()" style="background:var(--accent); flex:1">Save</button></div></div></div>

<div class="container">
    <h1 class="main-title">Scorepad</h1>
    <div id="winnerSpotlight"></div>
    
    <div style="display:flex; justify-content:space-between; gap:10px; margin-bottom:15px">
        <button onclick="saveAndRefresh()" style="flex:1; background:#3498db">💾 Sync</button>
        <button onclick="toggleManualMode()" id="seatingBtn" style="background:#34495e">🪑</button>
        <button onclick="toggleDarkMode()" style="background:#34495e">🌙</button>
    </div>

    <div class="input-section">
        <input type="text" id="playerName" placeholder="Player Name" style="flex:2" onkeypress="if(event.key==='Enter') addPlayer()">
        <div class="square-color-picker">
            <input type="color" id="playerColor" class="color-input-hidden" value="#3498db" oninput="document.getElementById('colorPreview').style.background = this.value">
            <div id="colorPreview" style="width:100%; height:100%; background:#3498db;"></div>
        </div>
        <button onclick="addPlayer()">Add</button>
    </div>

    <table id="leaderboardTable"><tbody id="leaderboard"></tbody></table>
    <div id="batchAction" style="display:none; margin-bottom: 20px;"><button onclick="submitBatchRound()" style="width:100%; background:#27ae60; padding:15px;">➕ Add Round Scores</button></div>

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0">📊 Rounds</h3>
        <select id="sortOrder" onchange="saveAndRefresh()" style="width:auto; padding:5px; height:32px; font-size:12px;">
            <option value="highToLow">High Wins</option>
            <option value="lowToHigh">Low Wins</option>
        </select>
    </div>
    
    <div class="round-container">
        <table id="roundTable"><thead><tr id="roundHeader"></tr></thead><tbody id="roundBody"></tbody><tfoot id="roundFooter"></tfoot></table>
    </div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('v54_players')) || [];
    let rounds = JSON.parse(localStorage.getItem('v54_rounds')) || [];
    let isDark = localStorage.getItem('v54_dark') === 'true';
    let isManualMode = false, draggingRow = null, renamingPlayerId = null;

    if (isDark) document.body.classList.add('dark-mode');

    const saveAndRefresh = () => { localStorage.setItem('v54_players', JSON.stringify(players)); localStorage.setItem('v54_rounds', JSON.stringify(rounds)); render(); };
    const closeModal = (id) => document.getElementById(id).style.display = 'none';
    const toggleDarkMode = () => { isDark = !isDark; document.body.classList.toggle('dark-mode'); localStorage.setItem('v54_dark', isDark); };

    function toggleManualMode() {
        isManualMode = !isManualMode;
        document.getElementById('seatingBtn').style.background = isManualMode ? "#3498db" : "#34495e";
        render();
    }

    function initDragEvents(row) {
        const start = (e) => {
            if (!isManualMode || e.target.closest('.editable-name') || e.target.closest('input') || e.target.closest('button')) return;
            draggingRow = row;
            row.classList.add('sortable-ghost');
        };

        const move = (e) => {
            if (!isManualMode || !draggingRow) return;
            if (e.cancelable) e.preventDefault();
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const target = document.elementFromPoint(clientX, clientY);
            const targetRow = target?.closest('tr');
            if (targetRow && targetRow !== draggingRow && targetRow.parentNode === draggingRow.parentNode) {
                const rect = targetRow.getBoundingClientRect();
                const next = (clientY - rect.top) / (rect.bottom - rect.top) > 0.5;
                targetRow.parentNode.insertBefore(draggingRow, next ? targetRow.nextSibling : targetRow);
            }
        };

        const end = () => {
            if (!draggingRow) return;
            draggingRow.classList.remove('sortable-ghost');
            Array.from(document.querySelectorAll('#leaderboard tr')).forEach((r, i) => {
                const p = players.find(x => x.id == r.getAttribute('data-id'));
                if(p) p.position = i;
            });
            draggingRow = null;
            saveAndRefresh();
        };

        row.addEventListener('touchstart', start, {passive: true});
        row.addEventListener('mousedown', start);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mousemove', move);
        window.addEventListener('touchend', end);
        window.addEventListener('mouseup', end);
    }

    function render() {
        const mode = document.getElementById('sortOrder').value;
        const listEl = document.getElementById('leaderboard');
        const rankedRef = [...players].sort((a,b) => mode === 'lowToHigh' ? a.score - b.score : b.score - a.score);
        let displayPlayers = isManualMode ? [...players].sort((a, b) => a.position - b.position) : [...rankedRef];

        document.getElementById('batchAction').style.display = players.length ? 'block' : 'none';
        listEl.innerHTML = ''; 

        displayPlayers.forEach((p) => {
            const rank = rankedRef.findIndex(rp => rp.id === p.id) + 1;
            const tr = document.createElement('tr');
            tr.setAttribute('data-id', p.id);
            tr.innerHTML = `
                <td class="drag-handle" style="${isManualMode ? '' : 'display:none'}">☰</td>
                <td style="width:3px;"><div style="width:3px;height:52px;background:${p.color}"></div></td>
                <td style="width:30px; text-align:center; font-weight:bold;">${rank}</td>
                <td style="width:35px;"><div class="circle-color-picker" style="background:${p.color}"><input type="color" value="${p.color}" class="color-input-hidden" onchange="updateColor(${p.id}, this.value)"></div></td>
                <td><b class="editable-name" onclick="openRenameModal(${p.id})">${p.name}</b></td>
                <td style="width:35px; text-align:center" onclick="askDeletePlayer(${p.id}, '${p.name}')">🗑️</td>
                <td style="width:45px; text-align:center; font-weight:bold;">${p.score}</td>
                <td class="col-batch"><input type="number" id="batch-${p.id}" placeholder="+" style="width:65px; border:2px solid ${p.color}"></td>
            `;
            initDragEvents(tr);
            listEl.appendChild(tr);
        });

        document.getElementById('roundHeader').innerHTML = `<th>R</th>` + displayPlayers.map(p => `<th style="background:${p.color}; color:#000; font-size:11px;">${p.name[0]}</th>`).join('') + `<th>✕</th>`;
        document.getElementById('roundBody').innerHTML = rounds.map((r, ri) => `<tr><td>${ri+1}</td>${displayPlayers.map(p => `<td>${r.scores[p.id]||0}</td>`).join('')}<td onclick="askDeleteRound(${ri})">✕</td></tr>`).join('');
        document.getElementById('roundFooter').innerHTML = players.length ? `<tr class="total-row"><td>Σ</td>${displayPlayers.map(p => `<td style="color:${p.color}">${p.score}</td>`).join('')}<td></td></tr>` : "";
        
        const spot = document.getElementById('winnerSpotlight');
        if (players.length) { 
            spot.style.display = 'block'; spot.style.background = rankedRef[0].color; 
            spot.innerText = `🌟 Leader: ${rankedRef[0].name} (${rankedRef[0].score})`; 
        } else spot.style.display = 'none';
    }

    function addPlayer() { 
        const n = document.getElementById('playerName'); 
        if(!n.value) return; 
        players.push({id:Date.now(), name:n.value, score:0, color:document.getElementById('playerColor').value, position:players.length}); 
        n.value=""; 
        n.focus(); // AUTO-FOCUS BACK TO INPUT
        saveAndRefresh(); 
    }

    function openRenameModal(id) { 
        renamingPlayerId = id; 
        document.getElementById('renameInput').value = players.find(x => x.id === id).name; 
        document.getElementById('renameModal').style.display = 'flex'; 
    }
    
    function saveRename() { 
        const n = document.getElementById('renameInput').value.trim(); 
        if(n){ players.find(x => x.id === renamingPlayerId).name = n; closeModal('renameModal'); saveAndRefresh(); } 
    }

    function submitBatchRound() {
        const nr = { scores: {} }; let added = false;
        players.forEach(p => {
            const v = parseInt(document.getElementById(`batch-${p.id}`).value);
            if(!isNaN(v)) { p.score += v; nr.scores[p.id] = v; document.getElementById(`batch-${p.id}`).value = ""; added = true; } 
            else nr.scores[p.id] = 0;
        });
        if(added) { rounds.push(nr); saveAndRefresh(); }
    }
    function updateColor(id, c) { players.find(x => x.id === id).color = c; saveAndRefresh(); }
    function askDeletePlayer(id, n) { if(confirm(`Delete ${n}?`)) { players = players.filter(p => p.id !== id); saveAndRefresh(); } }
    function askDeleteRound(i) { if(confirm(`Delete Round ${i+1}?`)) { const r = rounds[i]; players.forEach(p => p.score -= (r.scores[p.id] || 0)); rounds.splice(i, 1); saveAndRefresh(); } }

    window.onload = render;
</script>
</body>
</html>
